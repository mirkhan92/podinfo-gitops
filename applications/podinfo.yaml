apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: podinfo
  namespace: argocd

spec:
  project: default

  source:
    repoURL: https://github.com/mirkhan92/podinfo-gitops.git
    targetRevision: HEAD
    path: podinfo

      #    helm:
      #valueFiles:
      # - values.yaml

  destination:
    server: https://kubernetes.default.svc
    namespace: podinfo

  syncPolicy:
    automated:
      prune: true
      selfHeal: true

    syncOptions:
      - CreateNamespace=true
